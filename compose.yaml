services:
  broker:
    image: confluentinc/cp-kafka:8.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qo'
      KAFKA_LOG4J_ROOT_LOGLEVEL: 'WARN'
      KAFKA_LOG4J_LOGGERS: 'kafka=WARN,kafka.network=WARN,org.apache.kafka=WARN'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
      KAFKA_LOG_CLEANUP_POLICY: 'delete'
      KAFKA_LOG_RETENTION_MS: -1
      KAFKA_LOG_RETENTION_BYTES: -1
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 5000

  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.0
    depends_on:
      - broker
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'broker:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: FULL_TRANSITIVE

  kafka-setup:
    image: confluentinc/cp-kafka:8.2.0
    depends_on:
      - broker
      - schema-registry
    volumes:
      - ./src/main/resources/avro:/avro
    command:
      - /bin/sh
      - -c
      - |
        # Wait for Kafka to be ready
        echo 'Waiting for Kafka to be ready...'
        until kafka-topics --bootstrap-server broker:29092 --list; do
          sleep 1
        done

        echo 'Creating Kafka topics...'
        kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic account-events --config cleanup.policy=delete
        kafka-topics --bootstrap-server broker:29092 --create --if-not-exists --topic user-events --config cleanup.policy=delete

        echo 'Successfully created the following topics:'
        kafka-topics --bootstrap-server broker:29092 --list

        echo 'Waiting for Schema Registry to be ready...'
        until curl -s http://schema-registry:8081/subjects > /dev/null; do
          sleep 1
        done

        echo 'Setting global compatibility level to FULL_TRANSITIVE...'
        curl -s -f -X PUT -H "Content-Type: application/vnd.schemaregistry.v1+json" \
          --data '{"compatibility": "FULL_TRANSITIVE"}' \
          http://schema-registry:8081/config

        echo 'Registering schemas...'
        # Register account-event schema
        echo 'Registering account-event schema...'
        python3 -c "import json, sys; print(json.dumps({'schema': sys.stdin.read()}))" < /avro/account-event.avsc | \
          curl -s -f -X POST -H "Content-Type: application/vnd.schemaregistry.v1+json" \
          --data @- http://schema-registry:8081/subjects/account-events-value/versions

        # Register user-event schema
        echo 'Registering user-event schema...'
        python3 -c "import json, sys; print(json.dumps({'schema': sys.stdin.read()}))" < /avro/user-event.avsc | \
          curl -s -f -X POST -H "Content-Type: application/vnd.schemaregistry.v1+json" \
          --data @- http://schema-registry:8081/subjects/user-events-value/versions

  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: demo_kafka

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    ports:
      - "8080:8080"
    depends_on:
      - broker
      - schema-registry
    environment:
      AUTH_TYPE: DISABLED
      KAFKA_CLUSTERS_0_NAME: docker-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
